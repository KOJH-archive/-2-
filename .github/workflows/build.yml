name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet[all]

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK with Flet
      run: |
        # Build APK with location permissions
        # --verbose helps debug any errors during the first build
        flet build apk --permissions location --verbose

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: weatherhub-apk
        path: build/apk/*.apk
        retention-days: 30
